name: infra

# Terraform plan on PRs / apply on push to main. OIDC -> terraform role.
on:
  push:
    branches: [main]
    paths:
      - "infra/**"
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC role assumption
  contents: read
  pull-requests: write # to comment the plan on PRs

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
  TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}

jobs:
  terraform:
    name: terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/Crime-IS-github-actions-terraform-role
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const body = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show plan</summary>

            \`\`\`
            ${process.env.PLAN}
            \`\`\`
            </details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve tfplan
